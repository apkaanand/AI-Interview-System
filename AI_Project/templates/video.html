<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Video Interview</title>

<style>

body{
    margin:0;
    padding:0;
    background:#020617;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

h1{
    font-size:60px;
    margin-bottom:10px;

    background:linear-gradient(
        90deg,
        #00f5ff,
        #9333ea
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#question{
    font-size:32px;
    margin-bottom:25px;
    text-align:center;
    color:white;
}

video{
    width:900px;
    max-width:95%;
    border-radius:25px;
    border:4px solid #2563eb;
    background:black;
    box-shadow:0 0 40px rgba(37,99,235,0.4);
}

.button-group{
    display:flex;
    gap:20px;
    margin-top:30px;
}

button{
    padding:18px 35px;
    border:none;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    color:white;

    background:linear-gradient(
        90deg,
        #2563eb,
        #9333ea
    );

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#feedback{
    margin-top:40px;
    width:90%;
    max-width:900px;
    background:#081126;
    padding:30px;
    border-radius:25px;
    display:none;
}

#feedback h2{
    margin-bottom:20px;
    font-size:40px;

    background:linear-gradient(
        90deg,
        #00f5ff,
        #9333ea
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.feedback-item{
    margin-bottom:15px;
    font-size:22px;
    color:#cbd5e1;
}

</style>

</head>

<body>

<h1>

AI VIDEO INTERVIEW

</h1>

<h2 id="question">

Click Start Camera

</h2>

<video id="video" autoplay playsinline muted></video>

<div class="button-group">

<button onclick="startCamera()">

START CAMERA

</button>

<button onclick="skipQuestion()">

SKIP QUESTION

</button>

<button onclick="showFeedback()">

END INTERVIEW

</button>

</div>

<div id="feedback">

<h2>

INTERVIEW FEEDBACK

</h2>

<div class="feedback-item">

✅ Confidence Level : 8/10

</div>

<div class="feedback-item">

✅ Communication Skills : 9/10

</div>

<div class="feedback-item">

✅ Technical Knowledge : 8/10

</div>

<div class="feedback-item">

✅ Face Expression : Positive

</div>

<div class="feedback-item">

✅ Eye Contact : Good

</div>

<div class="feedback-item">

✅ Overall Performance : Excellent

</div>

<div class="feedback-item">

🎯 Final Score : 85/100

</div>

</div>

<script>

const questions = [

    "Tell me about yourself",

    "What are your strengths?",

    "Why should we hire you?",

    "What is Artificial Intelligence?",

    "What is Machine Learning?",

    "Explain your project",

    "What are your career goals?",

    "Why do you want this job?",

    "What are your weaknesses?",

    "Explain Python basics"

];

let index = 0;

let timer;

async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({

            video:true,
            audio:false

        });

        const video = document.getElementById("video");

        video.srcObject = stream;

        askQuestion();

        timer = setInterval(

            askQuestion,

            60000

        );

    }

    catch(error){

        alert("Please Allow Camera Permission");

        console.log(error);

    }

}

function askQuestion(){

    document.getElementById(

        "question"

    ).innerHTML = questions[index];

    index++;

    if(index >= questions.length){

        index = 0;

    }

}

function skipQuestion(){

    askQuestion();

}

function showFeedback(){

    clearInterval(timer);

    document.getElementById(

        "feedback"

    ).style.display = "block";

}

</script>

</body>

</html>
