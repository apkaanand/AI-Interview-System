<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Progress</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.main-full{
    padding:40px;
    margin-left:0;
}

.progress-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.progress-heading{
    font-size:70px;

    background:linear-gradient(
        90deg,
        #00f5ff,
        #9333ea
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.progress-subtitle{
    color:#94a3b8;
    margin-top:10px;
    font-size:20px;
}

.logout-btn{
    padding:18px 30px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:18px;
    cursor:pointer;

    background:linear-gradient(
        90deg,
        #2563eb,
        #9333ea
    );
}

</style>

</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="main-full">

    <!-- TOP -->

    <div class="progress-top">

        <div>

            <h1 class="progress-heading">

                YOUR PROGRESS

            </h1>

            <p class="progress-subtitle">

                Smart AI based interview analytics dashboard.

            </p>

        </div>

        <a href="/dashboard"

        onclick="window.location.replace('/dashboard')">

            <button class="logout-btn">

                BACK

            </button>

        </a>

    </div>

    <!-- GRID -->

    <div class="grid">

        <!-- MCQ -->

        <div class="card">

            <div class="icon">

                <i class="fa-solid fa-chart-line"></i>

            </div>

            <h2>

                MCQ SCORE

            </h2>

            <p>

                {{ score }}/15

            </p>

        </div>

        <!-- AI STATUS -->

        <div class="card">

            <div class="icon">

                <i class="fa-solid fa-robot"></i>

            </div>

            <h2>

                AI HR STATUS

            </h2>

            <p>

                COMPLETED

            </p>

        </div>

        <!-- PERFORMANCE -->

        <div class="card">

            <div class="icon">

                <i class="fa-solid fa-award"></i>

            </div>

            <h2>

                PERFORMANCE

            </h2>

            <p>

                {% if score >= 12 %}

                    EXCELLENT

                {% elif score >= 8 %}

                    GOOD

                {% elif score >= 5 %}

                    AVERAGE

                {% else %}

                    NEED IMPROVEMENT

                {% endif %}

            </p>

        </div>

    </div>

</div>

</body>

</html>
